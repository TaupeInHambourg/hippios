services:
  postgres:
    image: postgres:16-alpine
    container_name: hippios-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      -  network-hippios-api

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: dev
    container_name: hippios-api
    restart: unless-stopped
    env_file:
      - ./api/.env
    environment:
      DB_HOST: postgres
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./api:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev
    networks:
      -  network-hippios-api

volumes:
  pgdata:
  node_modules:

networks:
  network-hippios-api:
    external: true